query GetBayaans (
  $startDate: DateTime, 
  $endDate: DateTime, 
  $search: String, 
  $limit: Int, 
  $skip: Int
) {
  bayaanCollection (
    where: {
      date_gte: $startDate,
      date_lte: $endDate,
      title_contains: $search,
    },
    limit: $limit, 
    skip: $skip,
    order: date_DESC
  ) {
    total
    items {
      ...BayaanFields
    }
  }
}